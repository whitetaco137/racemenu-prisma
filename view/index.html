                    const catalog = (state.data.makeup && state.data.makeup[e.listType]) || [];
                    if (!catalog.length) {
                        const empty = document.createElement("div");
                        empty.className = "dd-item";
                        empty.textContent = "(no textures registered)";
                        texMenu.appendChild(empty);
                    }
                    catalog.forEach((t) => {
                        const item = document.createElement("div");
                        item.className = "dd-item";
                        item.textContent = t.text || t.texture;
                        item.title = t.texture;
                        if (t.texture) attachTexHover(item, () => t.texture);
                        item.addEventListener("click", () => {
                            // SendPlayerTexture in the SWF: overlay types use
                            // the Overlay event, everything else Tint.
                            const ev = isOverlay(e.tintType) ? "RSM_OverlayTextureChange" : "RSM_TintTextureChange";
                            window.rmpModEvent(ev + "|" + t.texture + "|" + (e.tintType * 1000 + e.tintIndex));
                            e.texture = t.texture;
                            texBtn.textContent = "Texture: " + texName();
                            texMenu.classList.remove("open");
                        });
                        texMenu.appendChild(item);
                    });
                }
                texMenu.classList.toggle("open");
            });

            rowEl.appendChild(colorCtl.editorEl);
        }

        function makeRaceCrest(name) {
            const sigils = {
                "argonian": "<path d='M12 3 7 8l2 3-3 3 3 7h6l3-7-3-3 2-3z'/><path d='M9 12h6M10 16h4'/>",
                "breton": "<path d='m12 3 7 5-3 12H8L5 8z'/><path d='m12 6 2 5-2 5-2-5z'/>", "dark elf": "<path d='M12 3c4 3 5 7 4 13l-4 5-4-5c-1-6 0-10 4-13z'/><path d='M8 10h8M12 6v12'/>",
                "high elf": "<path d='m12 3 3 7 5 2-5 2-3 7-3-7-5-2 5-2z'/>", "imperial": "<path d='M5 5h14v11l-7 5-7-5z'/><path d='M8 9h8M12 6v10'/>",
                "khajiit": "<path d='m7 7 2-4 3 3 3-3 2 4v8c-2 4-8 4-10 0z'/><path d='M9 12h.01M15 12h.01M10 16h4'/>", "nord": "<path d='M12 3v18M5 7h14M7 17h10M8 7l4 5 4-5'/>",
                "orc": "<path d='m6 5 4 2 2-4 2 4 4-2-2 6 2 8-6 2-6-2 2-8z'/><path d='M8 13h8'/>", "redguard": "<path d='m12 3 6 4-2 11-4 3-4-3L6 7z'/><path d='M9 9h6M12 6v12'/>",
                "wood elf": "<path d='M12 3c5 4 6 10 0 18C6 13 7 7 12 3z'/><path d='M12 6v11M9 11l3 2 3-2'/>",
            };
            const crest = document.createElement("span");
            crest.className = "race-crest";
            const neutral = "<path d='m12 3 2.4 5.6L21 10l-5 4.1 1.5 6.9-5.5-3.3-5.5 3.3L8 14.1 3 10l6.6-1.4z'/><circle cx='12' cy='12' r='2.2'/>";
            crest.innerHTML = "<svg viewBox='0 0 24 24' aria-hidden='true'>" + (sigils[name.toLowerCase()] || neutral) + "</svg>";
            return crest;
        }

        function buildRaceRow(e, row) {
            const rowEl = row.el;
            rowEl.classList.add("race");

            const top = document.createElement("div");
            top.className = "top";

            const label = document.createElement("span");
            label.className = "name";
            label.textContent = displayName(e.text);

            const crest = makeRaceCrest(label.textContent);

            const badge = document.createElement("span");
            badge.className = "race-badge";

            top.appendChild(crest);
            top.appendChild(label);
            top.appendChild(badge);
            rowEl.appendChild(top);

            row.refreshRaceActive = () => {
                const active = state.playerRace && displayName(e.text) === state.playerRace;
                rowEl.classList.toggle("active-race", Boolean(active));
                badge.textContent = active ? "current" : "select";
            };
            row.refreshRaceActive();

            rowEl.addEventListener("click", () => {
                // Same call the original SWF makes in onItemPress:
                // GameDelegate.call("ChangeRace", [raceID, -1]).
                window.rmpSliderChange("ChangeRace|-1|" + e.raceID);
                badge.textContent = "loading…";
            });
        }

        function finishControlRow(row) {
            const e = row.entry;
            const list = $("rm-list");
            list.appendChild(row.el);
            updateRowChangedState(row);
            state.rows.push(row);
            state.rowByKey.set(row.key, row);
            if (e.sliderID >= 0) state.rowBySliderID.set(e.sliderID, row);
            if (e.callbackName === "ChangeHeadPart") requestSliderInfo(e);
        }

        function isSexEntry(e) {
            return e.callbackName === "ChangeSex" ||
                (e.min === 0 && e.max === 1 && e.interval >= 1 && /sex/i.test(e.rawText || e.text || ""));
        }

        // Only custom continuous body-style morphs are safe candidates for
        // raw over-range values. 3BA and HIMBO use their own callback prefixes
        // (not ChangeDoubleMorph), while Weight, vanilla face sliders and tints
        // retain the range registered by RaceMenu.
        function canOverdrive(e) {
            const customBodyCallback = /^(ChangeDoubleMorph|ChangeMorphCBBE|rsm_bodymorph_himbo)/i.test(e.callbackName || "");
            return e.type === 2 && customBodyCallback && e.sliderID >= 1000 && e.interval < 1;
        }

        function buildSexControl(e, row, label) {
            const ctl = document.createElement("div");
            ctl.className = "sex-control";
            [[0, "♂", "Male"], [1, "♀", "Female"]].forEach(([value, icon, text]) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.innerHTML = icon + "<span>" + text + "</span>";
                const refresh = () => btn.classList.toggle("active", Math.round(e.position) === value);
                refresh();
                btn.addEventListener("click", () => {
                    const from = e.position;
                    if (Math.round(from) === value) return;
                    e.position = value;
                    ctl.querySelectorAll("button").forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    window.rmpSliderChange("ChangeSex|" + e.sliderID + "|" + value);
                    pushHistory({ kind: "slider", key: row.key, from, to: value });
                    updateRowChangedState(row);
                });
                ctl.appendChild(btn);
            });
            row.setSliderValue = (v) => {
                e.position = Math.round(v);
                ctl.querySelectorAll("button").forEach((b, i) => b.classList.toggle("active", i === e.position));
                window.rmpSliderChange("ChangeSex|" + e.sliderID + "|" + e.position);
                updateRowChangedState(row);
            };
            row.el.appendChild(ctl);
        }

        function buildStepper(e, row) {
            const ctl = document.createElement("div");
            ctl.className = "stepper";
            const prev = document.createElement("button"); prev.textContent = "‹";
            const readout = document.createElement("span"); readout.className = "step-value";
            const next = document.createElement("button"); next.textContent = "›";
            const min = Math.round(e.min), max = Math.round(e.max);
            const refresh = () => { readout.textContent = Math.round(e.position) + " / " + max; prev.disabled = e.position <= min; next.disabled = e.position >= max; };
            const set = (v, historyFrom) => {
                e.position = Math.min(max, Math.max(min, Math.round(v)));
                refresh(); updateRowChangedState(row);
                window.rmpSliderChange(e.callbackName + "|" + e.sliderID + "|" + e.position);
                requestSliderInfo(e);
                if (historyFrom !== undefined && historyFrom !== e.position) pushHistory({ kind: "slider", key: row.key, from: historyFrom, to: e.position });
            };
            prev.addEventListener("click", () => set(e.position - 1, e.position));
            next.addEventListener("click", () => set(e.position + 1, e.position));
            row.setSliderValue = (v) => set(v);
            refresh(); ctl.appendChild(prev); ctl.appendChild(readout); ctl.appendChild(next); row.el.appendChild(ctl);
        }

        function buildRows() {
            const list = $("rm-list");
            list.innerHTML = "";
            state.rows = [];
            state.rowByKey = new Map();
            state.rowBySliderID = new Map();

            state.data.entries.forEach((e) => {
                if (!e.enabled || !e.text) return;
                if (e.type < 1 || e.type > 7) return;

                const row = { entry: e, key: entryKey(e) };

                const rowEl = document.createElement("div");
                rowEl.className = "rm-row";
                row.el = rowEl;

                if (e.type === 1) {
                    buildRaceRow(e, row);
                    list.appendChild(rowEl);
                    state.rows.push(row);
                    state.rowByKey.set(row.key, row);
                    return;
                }

                if (e.type >= 3) {
                    buildPaintRow(e, row);
                    list.appendChild(rowEl);
                    state.rows.push(row);
                    state.rowByKey.set(row.key, row);
                    return;
                }

                const top = document.createElement("div");
                top.className = "top";

                const label = document.createElement("span");
                label.className = "name";
                label.textContent = displayName(e.text);
                label.title = "Double-click to reset · Alt+click for info";
                label.addEventListener("dblclick", () => resetEntry(row));
                label.addEventListener("click", (ev) => {
                    if (ev.altKey) toggleRawInfo(row);
                });
                if (e.sliderID >= 1000) {
                    // Cosmetic only: any non-vanilla slider, regardless of which
                    // addon registered it — dispatch treats them identically.
                    const mark = document.createElement("span");
                    mark.className = "custom-mark";
                    mark.textContent = "custom";
                    label.appendChild(mark);
                }

                // Flash represented sex and enumerated head parts as sliders.
                // In a character creator they are choices, so use direct controls.
                if (isSexEntry(e)) {
                    top.appendChild(label);
                    rowEl.appendChild(top);
                    buildSexControl(e, row, label);
                    finishControlRow(row);
                    return;
                }
                const hasColorControl = e.filterFlag > 0 && (e.filterFlag & CATEGORY_COLOR) && e.tintType >= 0;
                // Keep discrete colour entries on the full row path below so
                // their swatch and custom colour editor are never discarded.
                if (!hasColorControl && e.interval >= 1 && (e.max - e.min) <= 80) {
                    top.appendChild(label);
                    rowEl.appendChild(top);
                    buildStepper(e, row);
                    const partEl = document.createElement("div");
                    partEl.className = "part-name";
                    partEl.style.display = "none";
                    row.partEl = partEl;
                    rowEl.appendChild(partEl);
                    finishControlRow(row);
                    return;
                }

                // Color-capable entries (CATEGORY_COLOR flag set by the SWF) get a swatch.
                let colorCtl = null;
                if (hasColorControl) {
                    const swatch = document.createElement("span");
                    swatch.className = "swatch";
                    const fill = document.createElement("span");
                    fill.className = "fill";
                    const argb = e.fillColor >>> 0;
                    fill.style.background = argbToHex(argb);
                    fill.style.opacity = Math.max(argbAlpha(argb) / 255, 0.15);
                    swatch.appendChild(fill);
                    label.appendChild(swatch);

                    colorCtl = buildColorEditor(e, fill);
                    colorCtl.bindRow(row);
                    swatch.addEventListener("click", (ev) => {
                        ev.stopPropagation();
                        colorCtl.editorEl.classList.toggle("open");
                    });
                }

                const val = document.createElement("span");
                val.className = "val";
                val.textContent = fmt(e.position, e.interval);
                val.title = canOverdrive(e) ? "Click to type a value · Overdrive supports custom ranges" : "Click to type a value";

                top.appendChild(label);
                top.appendChild(val);

                const slider = document.createElement("input");
                slider.type = "range";
                slider.min = e.min;
                slider.max = e.max;
                slider.step = e.interval > 0 ? e.interval : 0.01;
                slider.value = e.position;

                let lastSent = 0;
                let gestureStart = e.position;
                const send = (final) => {
                    const now = Date.now();
                    if (!final && now - lastSent < 60) return;
                    lastSent = now;
                    window.rmpSliderChange(e.callbackName + "|" + e.sliderID + "|" + slider.value);
                };

                function applyLocalValue(v, allowOverdrive) {
                    if (!isFinite(v)) return e.position;
                    // The slider track stays within the registered range, but
                    // Overdrive lets an explicit typed value travel unchanged
                    // to GameDelegate. This never applies to steppers/sex.
                    if (!(state.overdrive && allowOverdrive && canOverdrive(e))) {
                        v = Math.min(e.max, Math.max(e.min, v));
                    }
                    e.position = v;
                    const trackValue = Math.min(e.max, Math.max(e.min, v));
                    slider.value = trackValue;
                    slider.style.setProperty("--fill", (((trackValue - e.min) / Math.max(0.0001, e.max - e.min)) * 100) + "%");
                    val.textContent = fmt(v, e.interval);
                    updateRowChangedState(row);
                    return v;
                }

                slider.addEventListener("pointerdown", () => { gestureStart = e.position; });
                slider.addEventListener("mousedown", () => { gestureStart = e.position; });
                slider.addEventListener("input", () => {
                    applyLocalValue(parseFloat(slider.value));
                    send(false);
                });
                slider.addEventListener("change", () => {
                    send(true);
                    requestSliderInfo(e);
                    if (Math.abs(e.position - gestureStart) > 1e-9) {
                        pushHistory({ kind: "slider", key: row.key, from: gestureStart, to: e.position });
                    }
                    gestureStart = e.position;
                });

                // NOTE: no wheel handler on purpose — scrolling the list must
                // never change slider values (explicit user request).

                // Click the value to type an exact number.
                val.addEventListener("click", () => {
                    if (val.querySelector("input")) return;
                    const from = e.position;
                    const input = document.createElement("input");
                    input.type = "number";
                    if (!(state.overdrive && canOverdrive(e))) {
                        input.min = e.min;
                        input.max = e.max;
                    }
                    input.step = e.interval > 0 ? e.interval : 0.01;
                    input.value = e.position;

                    let finished = false;
                    const finish = (commit) => {
                        if (finished) return;
                        finished = true;
                        if (commit) {
                            const to = applyLocalValue(parseFloat(input.value), true);
                            window.rmpSliderChange(e.callbackName + "|" + e.sliderID + "|" + to);
                            requestSliderInfo(e);
                            if (Math.abs(to - from) > 1e-9) {
                                pushHistory({ kind: "slider", key: row.key, from, to });
                            }
                        }
                        val.textContent = fmt(e.position, e.interval);
                    };

                    input.addEventListener("keydown", (ev) => {
                        ev.stopPropagation();
                        if (ev.key === "Enter") { finish(true); }
                        else if (ev.key === "Escape") { finish(false); }
                    });
                    input.addEventListener("blur", () => finish(true));

                    val.textContent = "";
                    val.appendChild(input);
                    input.focus();
                    input.select();
                });

                row.setSliderValue = (v) => {
                    const applied = applyLocalValue(v, true);
                    window.rmpSliderChange(e.callbackName + "|" + e.sliderID + "|" + applied);
                    gestureStart = applied;
                };
                if (colorCtl) {
                    row.setColorValue = colorCtl.setColorValue;
                }

                const partEl = document.createElement("div");
                partEl.className = "part-name";
                partEl.style.display = "none";
                row.partEl = partEl;

                rowEl.appendChild(top);
                rowEl.appendChild(slider);
                slider.style.setProperty("--fill", (((e.position - e.min) / Math.max(0.0001, e.max - e.min)) * 100) + "%");
                rowEl.appendChild(partEl);
                if (colorCtl) {
                    rowEl.appendChild(colorCtl.editorEl);
                }
                list.appendChild(rowEl);
                updateRowChangedState(row);

                state.rows.push(row);
                state.rowByKey.set(row.key, row);
                if (e.sliderID >= 0) {
                    state.rowBySliderID.set(e.sliderID, row);
                }
                // Head-part selectors show their mesh name right away.
                if (e.callbackName === "ChangeHeadPart") {
                    requestSliderInfo(e);
                }
            });

            $("rm-count").textContent = state.rows.length + " entries";
        }

        function resetSteps(row) {
            const e = row.entry;
            const steps = [];
            if (Math.abs(e.position - e.initialPosition) > 1e-9 && row.setSliderValue) {
                steps.push({ kind: "slider", key: row.key, from: e.position, to: e.initialPosition });
            }
            if (e.tintType >= 0 && row.setColorValue) {
                const fromColor = e.fillColor >>> 0;
                const toColor = e.initialFillColor >>> 0;
                if (fromColor !== toColor) {
                    steps.push({ kind: "color", key: row.key, from: fromColor, to: toColor });
                }
            }
            return steps;
        }

        function resetEntry(row) {
            const steps = resetSteps(row);
            steps.forEach((s) => applySingle(s, s.to));
            if (steps.length === 1) pushHistory(steps[0]);
            else if (steps.length > 1) pushHistory({ kind: "batch", steps });
        }

        // ---------- filtering ----------

        // Keyword-based body/sex filter: hides sliders that clearly belong to
        // the other body type. Heuristic on purpose — toggleable via ♀♂.
        function sexFiltered(e) {
            if (!state.sexFilter) return false;
            const t = (e.text + " " + (e.rawText || "")).toLowerCase();
            if (state.playerSex === "female" && /\bhimbo\b/.test(t)) return true;
            if (state.playerSex === "male" && /\b(3ba|cbbe|uunp|bhunp|tbd)\b/.test(t)) return true;
            if (!/ube/i.test(state.playerRace) && /\bube\b/.test(t)) return true;
            return false;
        }

        function matchesCategory(entry, cat) {
            // Ground truth = CategoryFilter.entryMatchesFilter in the SWF:
            // an entry with NO filterFlag matches ANY category; otherwise
            // match by flag bitmask, then fall back to text filters.
            if (entry.filterFlag < 0) return true;
            if (cat.flag && (entry.filterFlag & cat.flag) !== 0) return true;
            if (cat.textFilter && entry.textFilters &&
                entry.textFilters.split("|").indexOf(cat.textFilter) !== -1) return true;
            return false;
        }

        function applyFilter() {
            const q = $("rm-search").value.trim().toLowerCase();
            const cat = state.activeCat === null ? null : state.data.categories[state.activeCat];

            let visible = 0;
            let changedCount = 0;
            state.rows.forEach((row) => {
                const { el, entry } = row;
                if (isChanged(entry)) changedCount++;

                let ok = true;
                if (q && !visibleName(entry).toLowerCase().includes(q)) ok = false;
                if (ok && cat) ok = matchesCategory(entry, cat);
                if (ok && state.showChangedOnly && !isChanged(entry)) ok = false;
                if (ok && entry.type === 2 && sexFiltered(entry)) ok = false;
                el.style.display = ok ? "" : "none";
                row.visible = ok;
                if (ok) visible++;
            });
            $("rm-count").textContent = visible + " / " + state.rows.length + " sliders · " + changedCount + " changed";
            rebuildGroupHeaders();
        }

        // Visual separators for slider families named "Group - Name"
        // (3BA "Breasts - *", HIMBO "Pecs - *", ...). Rebuilt on every filter
        // pass from the currently visible rows.
        function rebuildGroupHeaders() {
            const list = $("rm-list");
            list.querySelectorAll(".group-header").forEach((h) => h.remove());

            let curGroup = null;
            let groupRows = [];
            const flush = () => {
                if (curGroup && groupRows.length >= 2) {
                    const h = document.createElement("div");
                    h.className = "group-header";
                    h.textContent = curGroup;
                    list.insertBefore(h, groupRows[0].el);
                }
                groupRows = [];
            };

            state.rows.forEach((row) => {
                if (!row.visible || row.entry.type !== 2) {
                    flush();
                    curGroup = null;
                    return;
                }
                const m = visibleName(row.entry).match(/^(.{2,}?)\s*[-–:]\s+/);
                const g = m ? m[1].trim() : null;
                if (g !== curGroup) {
                    flush();
                    curGroup = g;
                }
                if (g) groupRows.push(row);
            });
            flush();
        }

        // ---------- outbound (JS -> C++) ----------

        $("rm-search").addEventListener("input", applyFilter);
        $("reload-btn").addEventListener("click", () => window.rmpRequestData(""));
        $("undo-btn").addEventListener("click", undo);
        $("redo-btn").addEventListener("click", redo);
        $("changed-toggle").addEventListener("click", () => {
            state.showChangedOnly = !state.showChangedOnly;
            $("changed-toggle").classList.toggle("active", state.showChangedOnly);
            applyFilter();
        });
        $("overdrive-toggle").addEventListener("click", () => {
            state.overdrive = !state.overdrive;
            $("overdrive-toggle").classList.toggle("active", state.overdrive);
            $("overdrive-toggle").textContent = state.overdrive ? "Overdrive on" : "Overdrive";
            store.set("rmpOverdrive", state.overdrive ? "1" : "0");
        });
        $("overdrive-toggle").classList.toggle("active", state.overdrive);
        if (state.overdrive) $("overdrive-toggle").textContent = "Overdrive on";
        $("sex-toggle").addEventListener("click", () => {
            state.sexFilter = !state.sexFilter;
            $("sex-toggle").classList.toggle("active", state.sexFilter);
            store.set("rmpSexFilter", state.sexFilter ? "1" : "0");
            applyFilter();
        });
        $("sex-toggle").classList.toggle("active", state.sexFilter);
        updateHistoryButtons();

        function done() {
            window.rmpDone($("rm-name").value.trim());
        }

        $("done-btn").addEventListener("click", done);
        document.addEventListener("keydown", (ev) => {
            if (ev.key === "Escape") done();
            if (ev.key === "Enter" && document.activeElement === $("rm-name")) done();
        });
    </script>
</body>
</html>
